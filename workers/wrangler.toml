name = "oisyasan-navi-ai"
main = "src/index.ts"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = false

# IP-based rate limit: 30 req / 60s per IP.
# `namespace_id` must be a unique integer per account. Update before deploy if needed.
[[unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 30, period = 60 }
